<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile Python Studio</title>
    <script src="./engine/pyodide.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        h2 { margin-top: 0; color: #30d5c8; }
        button, input[type="file"] { background: #1e1e1e; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        button.run-btn { background: #34c759; color: #fff; font-weight: bold; border: none; margin-top: 10px; }
        textarea { width: 100%; height: 250px; background: #1e1e1e; color: #00ff00; font-family: monospace; border: 1px solid #333; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        pre { background: #000; padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-family: monospace; color: #ff9500; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>🐍 Mobile Python Editor</h2>
    
    <label>Upload Existing File:</label>
    <input type="file" id="fileInput" accept=".py">

    <label>Edit Code:</label>
    <textarea id="codeInput"># Paste or type your custom scripts below!
my_number = 10
if my_number > 5:
    print("Your custom conditional test works perfectly!")
</textarea>

    <button class="run-btn" id="runBtn">▶ RUN CODE</button>

    <h3>Output:</h3>
    <pre id="output">Loading local Python system...</pre>

    <script>
        let pyodide;

        async function main() {
            try {
                pyodide = await loadPyodide({ indexURL: "./engine/" });
                document.getElementById('output').innerText = "Python system loaded locally! Ready to code.";
            } catch (err) {
                document.getElementById('output').innerText = "Error loading engine:\n" + err;
            }
        }
        main();

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('codeInput').value = e.target.result;
                document.getElementById('output').innerText = "File loaded successfully into editor!";
            };
            reader.readAsText(file);
        });

        document.getElementById('runBtn').addEventListener('click', async () => {
            if (!pyodide) { alert("Python is still loading!"); return; }
            
            const outputArea = document.getElementById('output');
            outputArea.innerText = "Running script...";
            
            let code = document.getElementById('codeInput').value.trim();

            // Safety Catch: Stop crashes if the text field is empty
            if (!code) {
                outputArea.innerText = "Error: Cannot execute an empty code field. Please type or upload a script.";
                return;
            }

            try {
                // Auto scan for any basic package dependencies
                await pyodide.loadPackagesFromImports(code);

                // Build a pristine string capture buffer for the print() function
                pyodide.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                    sys.stderr = io.StringIO()
                `);

                // Run your custom code blocks smoothly
                await pyodide.runPythonAsync(code);
                
                let stdout = pyodide.runPython("sys.stdout.getvalue()");
                let stderr = pyodide.runPython("sys.stderr.getvalue()");
                
                if (stderr) {
                    outputArea.innerText = "Python Error:\n" + stderr;
                } else {
                    outputArea.innerText = stdout || "Code ran with no errors, but did not print anything. Add a print() statement to view results!";
                }
            } catch (err) {
                outputArea.innerText = "Browser Runtime Error:\n" + err.message;
            }
        });
    </script>
</body>
</html>
