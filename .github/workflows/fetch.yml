name: Download Engine Files
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Core Python Engine files natively
        run: |
          npm install pyodide@0.26.1
          mkdir -p engine
          cp node_modules/pyodide/* engine/

      - name: Commit and Save files to folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine/
          git commit -m "Installed core Pyodide binaries cleanly via package manager"
          git push



