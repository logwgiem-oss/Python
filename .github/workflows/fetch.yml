name: Download Engine Files
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local engine folder
        run: mkdir -p engine

      - name: Download directly from GitHub Release Nodes
        run: |
          cd engine
          wget https://github.com
          tar -xjf pyodide-0.26.1.tar.bz2 --strip-components=1
          rm pyodide-0.26.1.tar.bz2

      - name: Commit and Save files to folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine/
          git commit -m "Pulled core Python binaries straight from GitHub network"
          git push


