name: Download Engine Files
on:
  workflow_dispatch:

# This line forces GitHub to grant full write access to the automation tool
permissions:
  contents: write

jobs:
  download-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local engine folder
        run: mkdir -p engine

      - name: Download the exact files needed safely
        run: |
          cd engine
          wget https://jsdelivr.net
          wget https://jsdelivr.net
          wget https://jsdelivr.net
          wget https://jsdelivr.net
          wget https://jsdelivr.net

      - name: Commit and Save files to folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine/
          git commit -m "Downloaded local engine files to bypass browser blocks"
          git push

